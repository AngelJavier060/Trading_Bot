version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trading_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # URL de conexión a PostgreSQL dentro de la red de Docker
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/trading_bot
      ALLOW_SQLITE_FALLBACK: "false"
      SQL_DEBUG: "false"
      SECRET_KEY: "dev-secret-change-me"
    ports:
      - "5000:5000"
    volumes:
      # Montar el código para facilitar el desarrollo (hot-reload básico)
      - ./backend:/app

volumes:
  db_data:
