version: "3.9"

# Local: backend con volumen para editar código en caliente.
# Producción: quita `volumes:` de trading-backend o usa solo la imagen construida;
#   un volumen vacío sobre /app borraría el código de la imagen.
#
# El front solo “hornea” NEXT_PUBLIC_API_URL en `docker build` (ARG en Dockerfile).
#   Cambiar la URL en runtime en `environment:` NO actualiza el JS del cliente; hay que reconstruir.

services:
  trading-db:
    image: postgres:16-alpine
    container_name: trading_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    # No exponemos el puerto 5432 al host para evitar conflictos con otros PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  trading-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trading_backend
    restart: unless-stopped
    depends_on:
      trading-db:
        condition: service_healthy
    environment:
      PG_HOST: trading-db
      PG_PORT: 5432
      PG_USER: trading_user
      PG_PASSWORD: trading_pass
      PG_DATABASE: trading_bot
      ALLOW_SQLITE_FALLBACK: "false"
      SQL_DEBUG: "false"
      FLASK_DEBUG: "false"
      SECRET_KEY: "prod-secret-change-me"
      # Orígenes del panel web (coma-separados). Incluye www. si lo usas.
      CORS_ORIGINS: "https://trading.improvement-solution.com"
      FRONTEND_URL: "https://trading.improvement-solution.com"
    ports:
      # Exponemos el backend en el puerto 5001 del host para no chocar con otros servicios
      - "5001:5000"
    volumes:
      - ./backend:/app

  trading-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api-trading.improvement-solution.com"
    container_name: trading_frontend
    restart: unless-stopped
    depends_on:
      - trading-backend
    # Solo afecta al servidor Node del front en runtime; el bundle ya compiló la URL del API.
    environment:
      NEXT_PUBLIC_API_URL: "https://api-trading.improvement-solution.com"
    ports:
      - "3001:3000"

volumes:
  db_data:
