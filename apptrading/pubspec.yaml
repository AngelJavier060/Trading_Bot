name: apptrading
description: Trading Bot Mobile — Professional trading on the go
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # Storage
  shared_preferences: ^2.2.2

  # Charts
  fl_chart: ^0.68.0

  # Fonts & icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
